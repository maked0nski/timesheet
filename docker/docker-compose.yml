services:
  app:
    build: .
    container_name: timesheet-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: timesheet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: timesheet
      POSTGRES_USER: timesheet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - timesheet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timesheet -d timesheet"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  timesheet_pgdata:
