<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timesheet Debug</title>
    <style>
      body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #f7f7fb; color: #202126; }
      pre { white-space: pre-wrap; background: #fff; border: 1px solid #cfd1d8; border-radius: 6px; padding: 14px; }
      button { min-height: 44px; border: 0; border-radius: 4px; background: #078777; color: white; font-weight: 700; padding: 0 18px; }
    </style>
  </head>
  <body>
    <h1>Timesheet Debug</h1>
    <button id="run">Перевірити</button>
    <pre id="out">JS базово працює, якщо ви бачите цю сторінку.</pre>
    <script>
      var out = document.getElementById('out');
      function log(value) { out.textContent += '\n' + value; }
      window.addEventListener('error', function (event) { log('error: ' + event.message); });
      document.getElementById('run').onclick = function () {
        out.textContent = 'URL: ' + location.href;
        log('UserAgent: ' + navigator.userAgent);
        log('Cookies enabled: ' + navigator.cookieEnabled);
        log('ServiceWorker: ' + ('serviceWorker' in navigator));
        log('LocalStorage: ' + (function () { try { localStorage.setItem('ts-debug', '1'); localStorage.removeItem('ts-debug'); return 'ok'; } catch (e) { return e.message; } })());
        fetch('/api/session', { credentials: 'same-origin' })
          .then(function (response) { log('/api/session: ' + response.status); return response.text(); })
          .then(function (text) { log(text); })
          .catch(function (error) { log('fetch error: ' + error.message); });
      };
    </script>
  </body>
</html>
