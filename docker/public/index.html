    <title>Timesheet Web</title>
    <script>
      (function () {
        function showBootError(message) {
          var root = document.getElementById('root');
          if (!root || root.childElementCount > 0) return;
          root.innerHTML = '<main style="min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Arial,sans-serif;background:#f7f7fb;color:#202126">' +
            '<section style="max-width:420px;width:100%;background:#fff;border:1px solid #cfd1d8;border-radius:6px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.18)">' +
            '<h1 style="margin:0 0 12px;font-size:32px;font-weight:400">Timesheet</h1>' +
            '<p style="margin:0 0 16px;color:#606169">Додаток не запустився у цьому браузері. Натисніть оновити сторінку.</p>' +
            '<pre style="white-space:pre-wrap;font-size:12px;color:#a91f2a">' + String(message || 'boot timeout').replace(/[<>&]/g, function (c) { return { "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]; }) + '</pre>' +
            '<button onclick="location.reload()" style="width:100%;min-height:44px;border:0;border-radius:4px;background:#078777;color:white;font-weight:700">Оновити</button>' +
            '</section></main>';
        }
        window.addEventListener('error', function (event) { showBootError(event.message); });
        window.addEventListener('unhandledrejection', function (event) { showBootError(event.reason && (event.reason.message || event.reason)); });
        window.setTimeout(function () { showBootError('React boot timeout. User agent: ' + navigator.userAgent); }, 5000);
      })();
    </script>

        <section style="max-width:420px;width:100%;background:#fff;border:1px solid #cfd1d8;border-radius:6px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.18)">

        </section>
